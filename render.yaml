services:
  - type: web
    name: ai-dataset-mgmt-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-dataset-mgmt-db
          property: connectionString

databases:
  - name: ai-dataset-mgmt-db
    databaseName: ai_dataset_mgmt
    user: ai_dataset_mgmt_user
    plan: free
