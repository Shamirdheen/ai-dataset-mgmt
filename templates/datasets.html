{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Datasets</h4>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ Add Dataset</button>
</div>
<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr><th>Name</th><th>Domain</th><th>Format</th><th>Status</th><th>Creator</th><th>Action</th></tr>
      </thead>
      <tbody>
        {% for d in datasets %}
        <tr>
          <td>{{ d.name }}</td>
          <td><span class="badge bg-info text-dark">{{ d.domain }}</span></td>
          <td>{{ d.format }}</td>
          <td><span class="badge bg-success">{{ d.status }}</span></td>
          <td>{{ d.creator }}</td>
          <td><a href="/datasets/delete/{{ d.dataset_id }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add Dataset</h5></div>
      <form method="POST" action="/datasets/add">
        <div class="modal-body">
          <input name="name" class="form-control mb-2" placeholder="Dataset name" required>
          <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>
          <select name="domain" class="form-select mb-2" required>
            <option>NLP</option><option>CV</option><option>TABULAR</option><option>AUDIO</option><option>MULTIMODAL</option>
          </select>
          <input name="format" class="form-control mb-2" placeholder="Format (CSV, PNG...)">
          <input name="source" class="form-control mb-2" placeholder="Source URL">
          <select name="created_by" class="form-select mb-2" required>
            {% for u in users %}<option value="{{ u.user_id }}">{{ u.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
